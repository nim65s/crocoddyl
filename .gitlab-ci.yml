variables:
  GIT_SUBMODULE_STRATEGY: "recursive"
  CTEST_PARALLEL_LEVEL: 4

test:
  image: eur0c.laas.fr:5000/loco-3d/crocoddyl
  script:
    - cmake .
    - make
    - make test || ctest -VV

format:
  image: gepetto/linters
  before_script:
    - ln -s /root/setup.cfg /builds
    - ln -s /root/.clang-format /builds
  script:
    - ls -lA /builds
    - flake8 .
    - yapf -dr .
    - check-clang-format.sh
