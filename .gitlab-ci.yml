variables:
  GIT_SUBMODULE_STRATEGY: "recursive"
  CTEST_PARALLEL_LEVEL: 4
  CTEST_OUTPUT_ON_FAILURE: 1

test:
  image: eur0c.laas.fr:5000/loco-3d/crocoddyl
  script:
    - cmake .
    - make
    - make test

format:
  image: gepetto/linters
  script:
    - flake8 .
    - yapf -dr .
    - check-clang-format.sh
